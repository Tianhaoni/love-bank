<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Thomas ❤️ Alice - Love Bank</title>

    <!-- 引入 Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <!-- 可爱艺术字体 -->
    <link
      href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ===== 完整样式（与之前相同，只是增加了开屏相关样式） ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "ZCOOL KuaiLe", "Comic Sans MS", "Chalkboard SE", cursive;
        min-height: 100vh;
        overflow-x: hidden;
        background:
          radial-gradient(
            circle at 20% 20%,
            rgba(255, 120, 180, 0.35),
            transparent 30%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(255, 200, 230, 0.25),
            transparent 30%
          ),
          linear-gradient(135deg, #0f1022, #1a1230, #29152f);
        color: white;
        -webkit-tap-highlight-color: transparent;
        padding-top: 60px;
      }
      h1,
      h2,
      h3,
      p,
      button,
      input,
      select,
      .ticket,
      .date-badge,
      .fortune-text {
        font-family: inherit;
      }
      .bg {
        position: fixed;
        inset: 0;
        background: linear-gradient(
          45deg,
          rgba(255, 255, 255, 0.03),
          rgba(255, 255, 255, 0)
        );
        animation: float 12s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }
      @keyframes float {
        50% {
          transform: translateY(-20px);
        }
      }
      .container {
        max-width: 1100px;
        margin: auto;
        padding: 20px 16px 30px;
        position: relative;
        z-index: 1;
      }
      .glass {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 28px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
      }
      .hero {
        text-align: center;
        padding: 30px 20px 36px;
        position: relative;
      }
      h1 {
        font-size: 2.8rem;
        letter-spacing: 1px;
        font-weight: 400;
      }
      .subtitle {
        opacity: 0.85;
        margin-top: 8px;
        font-size: 1.2rem;
      }
      #days {
        margin-top: 12px;
        display: inline-block;
        padding: 8px 28px;
        border-radius: 40px;
        backdrop-filter: blur(4px);
        background: rgba(255, 255, 255, 0.08);
        min-width: 200px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
        margin-top: 20px;
      }
      .card {
        padding: 22px 20px;
        text-align: center;
        position: relative;
      }
      .card h2 {
        cursor: pointer;
        user-select: none;
        transition: 0.2s;
        font-weight: 400;
        font-size: 1.8rem;
      }
      .card h2:hover {
        opacity: 0.7;
      }
      .ticket {
        font-size: 3.5rem;
        margin: 8px 0 12px;
        font-weight: 400;
      }
      button {
        border: none;
        padding: 12px 20px;
        border-radius: 16px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.15);
        color: white;
        font-weight: 400;
        font-size: 1rem;
        transition: all 0.2s;
        touch-action: manipulation;
        border: 1px solid rgba(255, 255, 255, 0.05);
        font-family: inherit;
      }
      button:active {
        transform: scale(0.94);
        background: rgba(255, 255, 255, 0.25);
      }
      .btn-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 6px;
        display: none;
      }
      .btn-group.show {
        display: flex;
      }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
      }
      .actions button {
        flex: 1;
        min-width: 100px;
        padding: 14px 10px;
        background: rgba(255, 200, 230, 0.15);
      }
      input,
      select {
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        border: none;
        margin-top: 6px;
        margin-bottom: 14px;
        background: rgba(255, 255, 255, 0.12);
        color: white;
        font-size: 1rem;
        outline: 1px solid rgba(255, 255, 255, 0.08);
        -webkit-appearance: none;
        font-family: inherit;
      }
      input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        align-items: center;
        justify-content: center;
        z-index: 999;
        padding: 20px;
        backdrop-filter: blur(4px);
      }
      .modal-content {
        width: min(500px, 100%);
        padding: 28px 24px;
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal-content h2 {
        margin-bottom: 16px;
        font-weight: 400;
      }
      .modal-actions {
        display: flex;
        gap: 12px;
        margin-top: 6px;
      }
      .modal-actions button {
        flex: 1;
      }
      .history-item {
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 1rem;
        line-height: 1.4;
      }
      .history-item:last-child {
        border-bottom: none;
      }
      .heart {
        position: fixed;
        color: #ff9ac7;
        animation: rise linear forwards;
        pointer-events: none;
        z-index: 1;
      }
      @keyframes rise {
        from {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
        to {
          transform: translateY(-120vh) scale(0.6);
          opacity: 0;
        }
      }
      .wish-count-input {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .wish-count-input input {
        width: 80px;
        margin-bottom: 0;
        text-align: center;
      }
      .data-tools {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .data-tools button {
        font-size: 0.85rem;
        padding: 8px 14px;
        background: rgba(255, 255, 255, 0.06);
      }
      #fileInput {
        display: none;
      }

      /* 通知横幅 */
      #notification {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%) translateY(-80px);
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 12px 28px;
        border-radius: 60px;
        color: white;
        font-size: 1rem;
        font-weight: 400;
        z-index: 9999;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        white-space: nowrap;
        max-width: 90vw;
        overflow: hidden;
        text-overflow: ellipsis;
        pointer-events: none;
      }
      #notification.show {
        transform: translateX(-50%) translateY(0px);
      }
      .cloud-status {
        font-size: 0.75rem;
        opacity: 0.6;
        margin-top: 4px;
      }
      .cloud-status.synced {
        color: #7dffb3;
      }
      .cloud-status.offline {
        color: #ffb07d;
      }

      /* 愿望表格 */
      .wish-table-wrap {
        overflow-x: auto;
        margin-top: 8px;
      }
      .wish-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95rem;
      }
      .wish-table th {
        text-align: left;
        padding: 10px 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        opacity: 0.7;
        font-weight: 400;
      }
      .wish-table td {
        padding: 10px 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        vertical-align: middle;
      }
      .wish-table .completed-true {
        opacity: 0.6;
        text-decoration: line-through;
      }
      .wish-table .status-badge {
        display: inline-block;
        padding: 2px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 400;
      }
      .status-badge.done {
        background: rgba(100, 255, 150, 0.2);
        color: #7dffb3;
      }
      .status-badge.pending {
        background: rgba(255, 215, 0, 0.2);
        color: #ffd700;
      }
      .wish-table .toggle-btn {
        padding: 4px 12px;
        font-size: 0.8rem;
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        cursor: pointer;
        transition: 0.2s;
      }
      .wish-table .toggle-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .wish-table .toggle-btn:active {
        transform: scale(0.95);
      }
      .no-wishes {
        text-align: center;
        padding: 20px 0;
        opacity: 0.5;
        font-style: italic;
      }

      /* 动态背景 Canvas */
      #dynamicBgCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        opacity: 0.6;
        display: block;
      }

      /* 用户切换按钮 */
      .user-switcher {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 40px;
        padding: 6px 16px 6px 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        transition: 0.3s;
        font-size: 0.95rem;
        color: white;
        user-select: none;
      }
      .user-switcher:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .user-switcher .avatar {
        display: inline-block;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(255, 215, 0, 0.2);
        text-align: center;
        line-height: 28px;
        font-weight: 400;
        font-size: 0.8rem;
        color: #ffd700;
      }
      .user-switcher .arrow {
        font-size: 0.7rem;
        opacity: 0.6;
      }

      /* ===== 开屏遮罩样式 ===== */
      #splashOverlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 1s ease;
        opacity: 1;
        padding: 30px;
        cursor: pointer;
      }
      #splashOverlay.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splashOverlay .splash-card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 40px;
        padding: 40px 50px;
        max-width: 500px;
        width: 100%;
        text-align: center;
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        pointer-events: auto;
        cursor: default;
      }
      #splashOverlay .fortune-text {
        font-size: 1.8rem;
        font-weight: 400;
        color: #ffd700;
        line-height: 1.6;
        margin: 20px auto;
        text-shadow: 0 0 40px rgba(255, 215, 0, 0.15);
        max-width: 100%;
        word-wrap: break-word;
        word-break: break-word;
        white-space: normal;
      }
      #splashOverlay .splash-sub {
        font-size: 1.1rem;
        opacity: 0.7;
        margin-bottom: 20px;
      }
      #splashOverlay .identity-buttons {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 10px;
      }
      #splashOverlay .identity-buttons button {
        padding: 14px 40px;
        font-size: 1.2rem;
        border-radius: 40px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: white;
        font-weight: 400;
        cursor: pointer;
        transition: 0.3s;
        min-width: 120px;
      }
      #splashOverlay .identity-buttons button:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.02);
      }
      #splashOverlay .identity-buttons button:active {
        transform: scale(0.95);
      }
      #splashOverlay .identity-buttons button.selected {
        background: rgba(255, 215, 0, 0.2);
        border-color: #ffd700;
      }
      #splashOverlay .auto-timer {
        margin-top: 18px;
        font-size: 0.9rem;
        opacity: 0.4;
      }
      #splashOverlay .skip-hint {
        margin-top: 12px;
        font-size: 0.8rem;
        opacity: 0.3;
        letter-spacing: 1px;
      }

      @media (max-width: 600px) {
        .user-switcher {
          top: 12px;
          right: 12px;
          padding: 4px 12px 4px 8px;
          font-size: 0.8rem;
        }
        .user-switcher .avatar {
          width: 24px;
          height: 24px;
          line-height: 24px;
          font-size: 0.7rem;
        }
        .hero h1 {
          font-size: 2.2rem;
        }
        #days {
          font-size: 1.2rem;
          padding: 6px 16px;
        }
        .ticket {
          font-size: 2.8rem;
        }
        #splashOverlay .splash-card {
          padding: 30px 20px;
        }
        #splashOverlay .fortune-text {
          font-size: 1.4rem;
        }
        #splashOverlay .identity-buttons button {
          padding: 10px 20px;
          font-size: 1rem;
          min-width: 80px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ===== 开屏遮罩 ===== -->
    <div id="splashOverlay">
      <div class="splash-card">
        <div class="splash-sub">✨ 今日幸运签 ✨</div>
        <div class="fortune-text" id="splashFortuneText">加载中...</div>
        <div style="margin-top: 10px; font-size: 0.95rem; opacity: 0.6">
          请选择你的身份
        </div>
        <div class="identity-buttons">
          <button id="identityThomas">Thomas</button>
          <button id="identityAlice">Alice</button>
        </div>
        <div class="auto-timer" id="splashTimer">
          ⏳ 自动进入 <span id="splashCountdown">5</span>s
        </div>
        <div class="skip-hint">点击背景任意位置可跳过</div>
      </div>
    </div>

    <!-- ===== 通知横幅 ===== -->
    <div id="notification">💌 <span id="notifMsg">云端已连接</span></div>

    <!-- ===== 动态背景 Canvas ===== -->
    <canvas id="dynamicBgCanvas"></canvas>

    <!-- ===== 背景浮动 ===== -->
    <div class="bg"></div>

    <div class="container" id="mainApp" style="display: none">
      <div class="glass hero">
        <!-- 用户切换按钮 -->
        <div class="user-switcher" id="userSwitcher">
          <span class="avatar" id="userAvatar">T</span>
          <span id="userNameDisplay">Thomas</span>
          <span class="arrow">▼</span>
        </div>

        <h1>❤️ Thomas & Alice ❤️</h1>
        <p class="subtitle">Our Love Bank</p>
        <div id="days"></div>
        <p id="cloudStatus" class="cloud-status">☁️ 连接中...</p>
      </div>

      <div class="grid">
        <div class="glass card">
          <h2 id="thomasTitle">Thomas</h2>
          <div class="ticket">🎫 <span id="thomasCount"></span></div>
          <div class="btn-group" id="thomasBtns">
            <button onclick="adjust('thomas', 1)">+1</button>
            <button onclick="adjust('thomas', -1)">-1</button>
          </div>
        </div>

        <div class="glass card">
          <h2 id="aliceTitle">Alice</h2>
          <div class="ticket">🎫 <span id="aliceCount"></span></div>
          <div class="btn-group" id="aliceBtns">
            <button onclick="adjust('baby', 1)">+1</button>
            <button onclick="adjust('baby', -1)">-1</button>
          </div>
        </div>
      </div>

      <div class="glass card" style="margin-top: 20px">
        <h2>✨ Love Actions</h2>
        <div class="actions">
          <button onclick="openWish()">💫 使用许愿券</button>
          <button onclick="openRedeem()">🎁 兑换兑换码</button>
        </div>

        <div class="data-tools">
          <button onclick="resetAll()" style="color: #ff8a8a">
            🗑️ 清除所有记录
          </button>
          <button onclick="exportData()">📤 导出备份</button>
          <button onclick="document.getElementById('fileInput').click()">
            📥 导入备份
          </button>
          <input
            type="file"
            id="fileInput"
            accept=".json"
            onchange="importData(event)"
          />
        </div>
      </div>

      <div class="glass card" style="margin-top: 20px">
        <h2>📋 愿望列表</h2>
        <div class="wish-table-wrap" id="wishListContainer"></div>
      </div>

      <div class="glass card" style="margin-top: 20px">
        <h2>📜 历史记录</h2>
        <div id="history"></div>
      </div>
    </div>

    <!-- ===== 弹窗：使用许愿券 ===== -->
    <div class="modal" id="wishModal">
      <div class="glass modal-content">
        <h2>💫 使用许愿券</h2>
        <p style="opacity: 0.6; margin-bottom: 12px; font-size: 0.9rem">
          当前使用者：<span
            id="wishUserDisplay"
            style="color: #ffd700; font-weight: 400"
          ></span>
        </p>
        <input id="wishText" placeholder="写下你的愿望..." />
        <div class="wish-count-input">
          <label style="opacity: 0.8">数量：</label>
          <input id="wishCount" type="number" value="1" min="1" max="99" />
        </div>
        <div class="modal-actions">
          <button
            onclick="submitWish()"
            style="background: rgba(255, 120, 180, 0.3)"
          >
            提交愿望
          </button>
          <button onclick="closeModal()">取消</button>
        </div>
      </div>
    </div>

    <!-- ===== 弹窗：兑换 ===== -->
    <div class="modal" id="redeemModal">
      <div class="glass modal-content">
        <h2>🎁 兑换许愿券</h2>
        <p style="opacity: 0.6; margin-bottom: 12px; font-size: 0.9rem">
          兑换给：<span
            id="redeemUserDisplay"
            style="color: #ffd700; font-weight: 400"
          ></span>
        </p>
        <input id="redeemCode" placeholder="输入兑换码" />
        <div style="margin: 6px 0 14px; opacity: 0.6; font-size: 0.9rem">
          每个兑换码只能使用一次
        </div>
        <div class="modal-actions">
          <button onclick="redeem()" style="background: rgba(255, 215, 0, 0.2)">
            兑换
          </button>
          <button onclick="closeModal()">取消</button>
        </div>
      </div>
    </div>

    <script>
      // ================================================================
      // 开屏逻辑（身份选择 + 幸运签）
      // ================================================================
      const FORTUNES = [
        "✨ 你的微笑是我每天最期待的风景。",
        "💕 今天你比昨天更让我心动。",
        "🌟 与你在一起的每一天都是礼物。",
        "🌙 月光再美，也不及你眼眸的温柔。",
        "🌸 愿你的心情如花开般灿烂。",
        "🌻 你是我的太阳，温暖而明亮。",
        "🍀 幸运的是，我们彼此拥有。",
        "🌈 风雨过后，我们的彩虹更绚烂。",
        "🎵 你是我心中永远的单曲循环。",
        "💖 爱你，是我做过最正确的事。",
        "🌹 你值得世间所有的美好。",
        "⭐ 你的存在让我的世界闪闪发光。",
        "☀️ 今天也要像阳光一样明媚哦！",
        "🌊 我对你的爱，如潮水般永不褪去。",
        "🍫 你是我最甜蜜的巧克力。",
      ];

      let countdownInterval = null;
      let splashFadeTimeout = null;
      let isSplashFading = false;
      let currentUser = "thomas";

      // 设备指纹（用于存储身份）
      function getDeviceId() {
        let id = localStorage.getItem("loveBankDeviceId");
        if (id) return id;
        const components = [
          navigator.userAgent,
          screen.width + "x" + screen.height,
          navigator.language,
          new Date().getTimezoneOffset(),
          (() => {
            const canvas = document.createElement("canvas");
            canvas.width = 200;
            canvas.height = 50;
            const ctx = canvas.getContext("2d");
            ctx.textBaseline = "top";
            ctx.font = "14px Arial";
            ctx.fillStyle = "#f60";
            ctx.fillRect(125, 1, 62, 20);
            ctx.fillStyle = "#069";
            ctx.fillText("LoveBank", 2, 15);
            ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
            ctx.fillText("❤️", 4, 17);
            return canvas.toDataURL().substring(0, 50);
          })(),
        ];
        const hash = components.join("|||");
        let hashVal = 0;
        for (let i = 0; i < hash.length; i++) {
          const char = hash.charCodeAt(i);
          hashVal = (hashVal << 5) - hashVal + char;
          hashVal = hashVal & hashVal;
        }
        id =

      function markCodeAsUsed(code) {
        return new Promise((resolve, reject) => {
          if (!isCloudReady || !db) {
            reject(new Error("未连接到云端，无法验证兑换码"));
            return;
          }
          const ref = db.ref("usedCodes/");
          ref.transaction(
            (currentData) => {
              if (currentData && currentData[code]) {
                return;
              }
              if (!currentData) currentData = {};
              currentData[code] = true;
              return currentData;
            },
            (error, committed, snapshot) => {
              if (error) {
                reject(error);
              } else if (!committed) {
                reject(new Error("该兑换码已被其他设备使用"));
              } else {
                resolve();
              }
            },
            false,
          );
        });
      }

      function loadCodesFromCloud(callback) {
        if (!isCloudReady || !db) {
          callback({ LOVE2026: 3, HAPPY2026: 5 });
          return;
        }
        db.ref("codes/").once("value", (snap) => {
          const val = snap.val();
          if (val && typeof val === "object") {
            cachedCodes = val;
            callback(val);
          } else {
            const defaultCodes = { LOVE2026: 3, HAPPY2026: 5 };
            db.ref("codes/").set(defaultCodes);
            cachedCodes = defaultCodes;
            callback(defaultCodes);
          }
        });
      }

          const code = document
            .getElementById("redeemCode")
            .value.trim()
            .toUpperCase();

          if (!code) return alert("请输入兑换码");

          if (!isCloudReady || !db) {
            alert("请联网以验证兑换码");
            return;

          const doRedeem = (codes) => {
            if (!codes[code]) {
              alert("❌ 兑换码无效，请检查后重试");
              return;
            }

            db.ref("usedCodes/" + code).once("value", (snap) => {
              if (snap.exists()) {
                alert("❌ 该兑换码已被使用");
                return;
              }

              markCodeAsUsed(code)
                .then(() => {
                  const bonus = codes[code];
                  const newData = JSON.parse(JSON.stringify(data));
                  newData[user] += bonus;
                  const name = user === "thomas" ? "Thomas" : "Alice";
                  const log = `${name} 兑换 ${code} 获得 ${bonus} 张许愿券 🎉`;

        if (
          confirm(
            `当前使用者：${currentLabel}\n点击确定切换为 ${nextLabel}，取消则不变。`,
          )
        ) {
          const newUser = currentUser === "thomas" ? "baby" : "thomas";
          saveUserToDevice(newUser);
          showNotification(
            `👤 已切换为 ${newUser === "thomas" ? "Thomas" : "Alice"}`,
          );
          render();
        }
      }

      // 动态背景
      let bgCanvas,
        bgCtx,
        bgParticles = [];
      let bgAnimationId = null;

      function initBgCanvas() {
        bgCanvas = document.getElementById("dynamicBgCanvas");
        bgCtx = bgCanvas.getContext("2d");
        resizeBgCanvas();
        window.addEventListener("resize", resizeBgCanvas);
        generateBgParticles();
        startBgLoop();
      }

      function resizeBgCanvas() {
        if (!bgCanvas) return;
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
      }

      function generateBgParticles() {
        const count = 100;
        const styles = ["star", "flower", "heart", "glow"];
        const selectedStyles = [];
        const numStyles = Math.random() > 0.6 ? 2 : 1;
        for (let i = 0; i < numStyles; i++) {
          const idx = Math.floor(Math.random() * styles.length);
          selectedStyles.push(styles[idx]);
        }
        if (selectedStyles.length === 0) selectedStyles.push("star");

        const particles = [];
        for (let i = 0; i < count; i++) {
          const style =
            selectedStyles[Math.floor(Math.random() * selectedStyles.length)];
          const size =
            style === "star"
              ? 2 + Math.random() * 4
              : style === "flower"
                ? 8 + Math.random() * 14
                : style === "heart"
                  ? 10 + Math.random() * 12
                  : 3 + Math.random() * 6;
          particles.push({
            x: Math.random() * window.innerWidth,
            y:
              Math.random() * window.innerHeight * 1.2 -
              window.innerHeight * 0.2,
            size: size,
            speedX: (Math.random() - 0.5) * 0.4,
            speedY: 0.3 + Math.random() * 0.8,
            opacity: 0.3 + Math.random() * 0.5,
            rotation: Math.random() * 360,
            rotSpeed: (Math.random() - 0.5) * 2,
            type: style,
            color:
              style === "flower"
                ? `hsl(${330 + Math.random() * 40}, 80%, 70%)`
                : style === "heart"
                  ? `hsl(340, 90%, 65%)`
                  : style === "glow"
                    ? `hsl(200, 80%, 70%)`
                    : `hsl(45, 100%, 80%)`,
          });
        }
        bgParticles = particles;
      }

      function drawBgParticles() {
        if (!bgCtx) return;
        bgCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        bgParticles.forEach((p) => {
          bgCtx.save();
          bgCtx.translate(p.x, p.y);
          bgCtx.rotate((p.rotation * Math.PI) / 180);
          bgCtx.globalAlpha = p.opacity;

          if (p.type === "star") {
            const s = p.size;
            bgCtx.fillStyle = p.color;
            bgCtx.shadowColor = "rgba(255,255,200,0.3)";
            bgCtx.shadowBlur = 8;
            bgCtx.beginPath();
            for (let i = 0; i < 8; i++) {
              const r = i % 2 === 0 ? s : s * 0.4;
              const angle = (i * Math.PI) / 4 - Math.PI / 2;
              const x = Math.cos(angle) * r;
              const y = Math.sin(angle) * r;
              if (i === 0) bgCtx.moveTo(x, y);
              else bgCtx.lineTo(x, y);
            }
            bgCtx.closePath();
            bgCtx.fill();
          } else if (p.type === "flower") {
            const w = p.size * 0.7;
            const h = p.size * 0.4;
            bgCtx.fillStyle = p.color;
            bgCtx.shadowColor = "rgba(255,200,200,0.2)";
            bgCtx.shadowBlur = 6;
            bgCtx.beginPath();
            bgCtx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
            bgCtx.fill();
            bgCtx.fillStyle = "rgba(255,255,200,0.4)";
            bgCtx.shadowBlur = 0;
            bgCtx.beginPath();
            bgCtx.arc(0, 0, 3, 0, Math.PI * 2);
            bgCtx.fill();
          } else if (p.type === "heart") {
            const s = p.size * 0.8;
            bgCtx.fillStyle = p.color;
            bgCtx.shadowColor = "rgba(255,100,150,0.3)";
            bgCtx.shadowBlur = 12;
            bgCtx.beginPath();
            bgCtx.moveTo(0, s * 0.3);
            bgCtx.bezierCurveTo(-s * 0.6, -s * 0.3, -s * 0.9, 0, 0, s * 0.8);
            bgCtx.bezierCurveTo(s * 0.9, 0, s * 0.6, -s * 0.3, 0, s * 0.3);
            bgCtx.closePath();
            bgCtx.fill();
          } else {
            const grad = bgCtx.createRadialGradient(0, 0, 0, 0, 0, p.size);
            grad.addColorStop(
              0,
              `rgba(255,255,255,${0.5 + Math.random() * 0.3})`,
            );
            grad.addColorStop(1, `rgba(255,255,255,0)`);
            bgCtx.fillStyle = grad;
            bgCtx.shadowBlur = 0;
            bgCtx.beginPath();
            bgCtx.arc(0, 0, p.size, 0, Math.PI * 2);
            bgCtx.fill();
          }
          bgCtx.restore();
        });
      }

      function updateBgParticles() {
        bgParticles.forEach((p) => {
          p.x += p.speedX;
          p.y += p.speedY;
          p.rotation += p.rotSpeed;
          if (p.y > window.innerHeight + 30) {
            p.y = -30;
            p.x = Math.random() * window.innerWidth;
            p.speedY = 0.3 + Math.random() * 0.8;
            p.speedX = (Math.random() - 0.5) * 0.4;
          }
          if (p.x < -30) p.x = window.innerWidth + 30;
          if (p.x > window.innerWidth + 30) p.x = -30;
        });
      }

      function startBgLoop() {
        function loop() {
          updateBgParticles();
          drawBgParticles();
          bgAnimationId = requestAnimationFrame(loop);
        }
        loop();
      }

      function initAdmin() {
        const saved = sessionStorage.getItem("adminUnlocked");
        if (saved === "1") {
          adminUnlocked = true;
          document.getElementById("thomasBtns").classList.add("show");
          document.getElementById("aliceBtns").classList.add("show");
        }
        document
          .getElementById("thomasTitle")
          .addEventListener("dblclick", requestAdminAccess);
        document
          .getElementById("aliceTitle")
          .addEventListener("dblclick", requestAdminAccess);
      }

      function initUserSwitcher() {
        document
          .getElementById("userSwitcher")
          .addEventListener("click", function (e) {
            e.stopPropagation();
            switchUser();
          });
      }

      // ===== 主初始化函数（在开屏淡出后调用） =====
      function initMain() {
        loadUserFromDevice();
        initBgCanvas();
        initAdmin();
        initUserSwitcher();

        render();

        setInterval(createHeart, 1200);

        if (isCloudReady && db) {
          listenCloud();
          loadCodesFromCloud((codes) => {
            cachedCodes = codes;
            console.log("✅ 兑换码已加载", codes);
          });
          setTimeout(() => {
            db.ref("loveBank/").once("value", (snap) => {
              if (!snap.exists()) {
                syncToCloud();
                showNotification("☁️ 已连接云端，数据已同步");
              } else {
                const remoteVal = snap.val();
                if (remoteVal) {
                  isRemoteUpdate = true;
                  data = remoteVal;
                  if (!data.wishes) data.wishes = [];
                  saveLocal();
                  render();
                  setTimeout(() => {
                    isRemoteUpdate = false;
                  }, 500);
                  showNotification("☁️ 已同步云端最新数据");
                }
              }
              document.getElementById("cloudStatus").textContent =
                "☁️ 已连接云端";
              document.getElementById("cloudStatus").className =
                "cloud-status synced";
            });
          }, 500);
        }

        window.addEventListener("beforeunload", function () {
          try {
            localStorage.setItem("loveBank", JSON.stringify(data));
          } catch (e) {}
          if (bgAnimationId) cancelAnimationFrame(bgAnimationId);
        });
      }

      // 启动开屏
      showSplash();
    </script>
  </body>
</html>
